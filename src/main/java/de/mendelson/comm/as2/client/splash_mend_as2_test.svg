  <!-- Loading indicator (static circles - no animation) -->
  <g transform="translate(430, 277)">
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ce3131" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="-8" r="1.5" fill="#ce3131"/>
    <circle cx="6" cy="-6" r="1.5" fill="#ce3131" opacity="0.7"/>
    <circle cx="8" cy="0" r="1.5" fill="#ce3131" opacity="0.5"/>
