      <path d="M 6 6 L 6 0 Q 6 -6 12 -6 Q 18 -6 18 0 L 18 6" fill="none" stroke="#a93455" stroke-width="2.5"/>
      <circle cx="12" cy="15" r="3" fill="#e14242"/>
