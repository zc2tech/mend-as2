<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="506"
   height="312"
   viewBox="0 0 506 312"
   version="1.1"
   id="svg1166"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs588">
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5d1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#822c2c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ce3131;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e14242;stop-opacity:1" />
    </linearGradient>
  </defs>

  <title id="title590">mend-as2 Professional Edition - TEST MODE</title>

  <!-- Background -->
  <rect width="506" height="312" fill="url(#bgGradient)" />

  <!-- Subtle geometric pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="506" y2="312" stroke="#ffffff" stroke-width="1"/>
    <line x1="506" y1="0" x2="0" y2="312" stroke="#ffffff" stroke-width="1"/>
    <circle cx="253" cy="156" r="80" fill="none" stroke="#ffffff" stroke-width="1"/>
    <circle cx="253" cy="156" r="120" fill="none" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Main content area with card -->
  <rect x="30" y="50" width="446" height="212" rx="8" fill="#ffffff" opacity="0.98"/>

  <!-- Top accent bar - RED for test mode -->
  <rect x="30" y="50" width="446" height="8" rx="8" fill="url(#accentGradient)"/>

  <!-- AS2 Icon - Modern envelope with arrows -->
  <g transform="translate(60, 85)">
