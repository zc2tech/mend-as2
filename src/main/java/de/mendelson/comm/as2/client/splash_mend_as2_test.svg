    <rect x="0" y="10" width="80" height="60" rx="4" fill="#a93455" opacity="0.1" stroke="#a93455" stroke-width="2"/>
    <path d="M 0 10 L 40 40 L 80 10" fill="none" stroke="#a93455" stroke-width="2" stroke-linejoin="round"/>

    <!-- Bidirectional arrows -->
    <g transform="translate(90, 35)">
      <!-- Right arrow -->
      <path d="M 0 0 L 35 0 L 30 -5 M 35 0 L 30 5" fill="none" stroke="#ce3131" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Left arrow -->
      <path d="M 40 10 L 5 10 L 10 5 M 5 10 L 10 15" fill="none" stroke="#ce3131" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

