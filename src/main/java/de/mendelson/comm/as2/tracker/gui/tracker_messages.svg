    <line class="icon" x1="4" y1="11" x2="16" y2="11" stroke="#534741" stroke-width="1.5"/>
    <line class="icon" x1="4" y1="16" x2="16" y2="16" stroke="#534741" stroke-width="1.5"/>
    <line class="icon" x1="4" y1="21" x2="13" y2="21" stroke="#534741" stroke-width="1.5"/>
  </g>
</svg>
