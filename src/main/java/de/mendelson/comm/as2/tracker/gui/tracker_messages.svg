  <path class="icon" d="M24,10 C18,10 13,15 13,21 C13,27 24,40 24,40 C24,40 35,27 35,21 C35,15 30,10 24,10 Z M24,25 C21.8,25 20,23.2 20,21 C20,18.8 21.8,17 24,17 C26.2,17 28,18.8 28,21 C28,23.2 26.2,25 24,25 Z"/>
