<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Shield with lock icon for inbound authentication -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield background -->
  <path d="M 16 2 L 6 6 L 6 14 C 6 21 10 27 16 30 C 22 27 26 21 26 14 L 26 6 Z"
        fill="url(#shieldGrad)"
        stroke="#1a3a6b"
        stroke-width="1"/>

  <!-- Lock body -->
  <rect x="12" y="16" width="8" height="7"
        fill="#ffffff"
        stroke="#1a3a6b"
        stroke-width="1"
        rx="1"/>

  <!-- Lock shackle -->
  <path d="M 13 16 L 13 13 C 13 11.3 14.3 10 16 10 C 17.7 10 19 11.3 19 13 L 19 16"
        fill="none"
        stroke="#ffffff"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="16" cy="19" r="1.5" fill="#1a3a6b"/>
  <rect x="15.2" y="19" width="1.6" height="2.5" fill="#1a3a6b"/>
</svg>
