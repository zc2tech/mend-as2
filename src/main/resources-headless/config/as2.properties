# AS2 Server Configuration - Headless Build Profile
# This configuration is used when building with: mvn clean package -Pheadless
#
# In headless profile:
# - GUI is DISABLED by default (SwingUI dependencies excluded)
# - Only WebUI is available for management
# - Mina client-server port is NOT started
# - Significantly smaller deployment size
#
# For full build with SwingUI support, use: mvn clean package -Pfull

# GUI Configuration
# =================
# Disable GUI startup by default in headless builds
# Can be overridden with environment variable: AS2_START_GUI=true
# However, SwingUI JARs are NOT included in headless build, so GUI will fail to start
as2.startup.gui.enabled=false

# Display Mode (only relevant if GUI is enabled)
# ==============================================
# Options: LIGHT, DARK, HICONTRAST
# Ignored in headless mode
as2.display.mode=LIGHT

# Configuration Check
# ===================
# Skip configuration check on startup (useful for automated deployments)
# Can be overridden with environment variable: AS2_SKIP_CONFIG_CHECK=true
as2.startup.skip.configcheck=false

# Test Mode
# =========
# Use alternative ports for testing (client-server port 41234 instead of 1234)
# Can be overridden with environment variable: AS2_TEST_MODE=true
as2.test.mode=false

# Headless Deployment Notes
# ==========================
# This build is optimized for containerized/cloud deployments.
#
# Management access:
#   - WebUI: http://localhost:8080/as2/webui/
#   - REST API: http://localhost:8080/as2/api/
#
# SwingUI is NOT available:
#   - Mina client-server port (1234) is not started
#   - SwingUI JARs are excluded from the build
#   - Setting as2.startup.gui.enabled=true will log a warning but won't start GUI
#
# For full installation with SwingUI, use the 'full' build profile.
