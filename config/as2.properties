# AS2 Server Configuration
# This file contains startup behavior settings for the mendelson AS2 server
#
# You can override these settings using environment variables:
# - AS2_START_GUI (true/false)
# - AS2_DISPLAY_MODE (LIGHT/DARK/HICONTRAST)
# - AS2_SKIP_CONFIG_CHECK (true/false)
# - AS2_TEST_MODE (true/false)
# - AS2_LOG_LEVEL (ALL/FINEST/FINER/FINE/INFO/WARNING/SEVERE/OFF)

# GUI mode: Controls whether to start the Swing GUI client with the server
# Set to 'false' for headless/cloud-native deployments (containers, Kubernetes, etc.)
# Set to 'true' for desktop/local deployments with GUI
# Default: true
as2.startup.gui.enabled=true

# Display mode for GUI client (only used when GUI is enabled)
# Valid values: LIGHT, DARK, HICONTRAST
# Default: LIGHT
as2.display.mode=LIGHT

# Configuration check at startup: Runs system checks using oshi library
# Set to 'true' to skip configuration check for faster startup (~6 seconds faster)
# Set to 'false' to run configuration check (recommended for first-time setup)
# The configuration check still runs periodically in the background even if skipped at startup
# Default: false
as2.startup.skip.configcheck=true

# Test mode: When enabled, uses alternative ports for running alongside production instance
# Set to 'true' to enable test mode (uses ports: Jetty HTTP=11080, HTTPS=11443, Client-Server=41234)
# Set to 'false' for normal operation (uses ports: Jetty HTTP=8080, HTTPS=8443, Client-Server=1234)
# Default: false
as2.test.mode=false

# Logging level: Controls verbosity of server logs
# Valid values (from most to least verbose):
#   ALL     - All log messages (including FINEST/FINER/FINE debug)
#   FINEST  - Extremely detailed trace messages
#   FINER   - Very detailed debug messages
#   FINE    - Detailed debug messages
#   INFO    - Informational messages (recommended for production)
#   WARNING - Warning and error messages only
#   SEVERE  - Error messages only
#   OFF     - No logging
# Default: INFO
as2.log.level=INFO
