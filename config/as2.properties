# AS2 Server Configuration
# This file contains startup behavior settings for the mendelson AS2 server
#
# You can override these settings using environment variables:
# - AS2_START_GUI (true/false)
# - AS2_DISPLAY_MODE (LIGHT/DARK/HICONTRAST)
# - AS2_SKIP_CONFIG_CHECK (true/false)
# - AS2_TEST_MODE (true/false)
# - AS2_LOG_LEVEL (ALL/FINEST/FINER/FINE/INFO/WARNING/SEVERE/OFF)
# - AS2_DATABASE_TYPE (postgresql/mysql)
# - AS2_SENDORDER_QUEUE_STRATEGY (PERSISTENT/IN_MEMORY)
# - AS2_SENDORDER_QUEUE_MAX_DEPTH (number)
# - AS2_SENDORDER_QUEUE_CHECKPOINT_INTERVAL (seconds)

# SendOrder Queue Strategy
# =========================
# Controls how outbound message queue is managed (requires server restart to change)
#
# PERSISTENT: Store queue in database with pre-built encrypted messages (default)
#   - Pros: Full crash recovery, suitable for multi-instance deployments
#   - Cons: Higher memory usage (~100KB per order), database overhead
#
# IN_MEMORY: Store queue in memory with lightweight metadata and on-demand assembly
#   - Pros: 99% less memory (~1KB per order), no database overhead, lower latency
#   - Cons: 60-second data loss window on crash, single-instance only
#
# Valid values: PERSISTENT | IN_MEMORY
# Default: PERSISTENT (backward compatible)
sendorder.queue.strategy=IN_MEMORY

# Maximum queue depth for IN_MEMORY strategy (ignored for PERSISTENT)
# Prevents memory exhaustion by rejecting new orders when queue is full
# Default: 1000
sendorder.queue.max_depth=1000

# Checkpoint interval for IN_MEMORY strategy (seconds, ignored for PERSISTENT)
# How often to save queue state to disk for crash recovery
# Default: 60 seconds
sendorder.queue.checkpoint_interval=60

# GUI mode: Controls whether to start the Swing GUI client with the server
# Set to 'false' for headless/cloud-native deployments (containers, Kubernetes, etc.)
# Set to 'true' for desktop/local deployments with GUI
# Default: true
as2.startup.gui.enabled=true

# Display mode for GUI client (only used when GUI is enabled)
# Valid values: LIGHT, DARK, HICONTRAST
# Default: LIGHT
as2.display.mode=LIGHT

# Configuration check at startup: Runs system checks using oshi library
# Set to 'true' to skip configuration check for faster startup (~6 seconds faster)
# Set to 'false' to run configuration check (recommended for first-time setup)
# The configuration check still runs periodically in the background even if skipped at startup
# Default: false
as2.startup.skip.configcheck=true

# Test mode: When enabled, uses alternative ports for running alongside production instance
# Set to 'true' to enable test mode (uses ports: Jetty HTTP=11080, HTTPS=11443, Client-Server=41234)
# Set to 'false' for normal operation (uses ports: Jetty HTTP=8080, HTTPS=8443, Client-Server=1234)
# Default: false
as2.test.mode=false

# Logging level: Controls verbosity of server logs
# Valid values (from most to least verbose):
#   ALL     - All log messages (including FINEST/FINER/FINE debug)
#   FINEST  - Extremely detailed trace messages
#   FINER   - Very detailed debug messages
#   FINE    - Detailed debug messages
#   INFO    - Informational messages (recommended for production)
#   WARNING - Warning and error messages only
#   SEVERE  - Error messages only
#   OFF     - No logging
# Default: INFO
as2.log.level=INFO

# Database type: Controls which database system to use
# Valid values: postgresql, mysql
# - postgresql: Uses PostgreSQL database (default, port 5432)
# - mysql: Uses MySQL/MariaDB database (port 3306)
# Configure connection details in database-postgresql.properties or database-mysql.properties
# Default: postgresql
as2.database.type=mysql

# Server hostname: Used in email notifications (user creation, password reset)
# If not set, the system will attempt to detect the hostname automatically
# Set this to your server's public hostname or domain name for email links
# Can also be set via environment variable: AS2_SERVER_HOSTNAME
# Example: as2.example.com
# Default: Auto-detect via InetAddress.getLocalHost().getCanonicalHostName()
# as2.server.hostname=
as2.server.hostname=edisandbox.com