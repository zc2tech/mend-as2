# MySQL/MariaDB Database Configuration
# These settings can also be set via environment variables (MYSQL_*)

# Database connection
mysql.host=localhost
mysql.port=3306
mysql.user=as2user
mysql.password=as2password

# Database names
mysql.db.config=as2_db_config
mysql.db.runtime=as2_db_runtime

# HikariCP Connection Pool Settings
mysql.pool.maximumPoolSize=10
mysql.pool.minimumIdle=2
mysql.pool.connectionTimeout=30000
mysql.pool.idleTimeout=600000
mysql.pool.maxLifetime=1800000
