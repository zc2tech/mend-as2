name: Build and Upload Maven Artifact

permissions:
  contents: write
  packages: write

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Maven Thin
        run: mvn clean package

      - name: Upload Thin artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            target/*.zip

      - name: Build with Maven Full
        run: mvn clean package -P full

      - name: Upload Full artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            target/*.zip